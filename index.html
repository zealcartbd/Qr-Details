<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../assets/Favicon.png" />
    <title>ZealcartBD - Online Store</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Keyframes ── */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.88);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -400px 0;
        }
        100% {
          background-position: 400px 0;
        }
      }
      @keyframes cartBounce {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }
        25% {
          transform: translate(-50%, -58%) scale(1.1) rotate(-6deg);
        }
        75% {
          transform: translate(-50%, -44%) scale(0.95) rotate(4deg);
        }
      }
      @keyframes ripple {
        0% {
          transform: scale(0);
          opacity: 0.5;
        }
        100% {
          transform: scale(3);
          opacity: 0;
        }
      }
      @keyframes heroPulse {
        0%,
        100% {
          opacity: 0.18;
          transform: scale(1);
        }
        50% {
          opacity: 0.32;
          transform: scale(1.06);
        }
      }
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-28px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ── App shell ── */
      .app {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      /* ── Hero ── */
      .hero {
        width: 100%;
        background: #1f9821;
        clip-path: polygon(0 0, 100% 0, 100% 82%, 50% 100%, 0 82%);
        padding: 50px 16px 130px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      /* animated background circles */
      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        animation: heroPulse 4s ease-in-out infinite;
      }
      .hero::before {
        width: 320px;
        height: 320px;
        top: -80px;
        right: -80px;
        animation-delay: 0s;
      }
      .hero::after {
        width: 200px;
        height: 200px;
        bottom: 40px;
        left: -50px;
        animation-delay: 2s;
      }

      .brand-name {
        color: #fff;
        font-size: 1.35rem;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        position: relative;
        z-index: 1;
        animation: fadeDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Store card ── */
      .store-card {
        background: #fff;
        border-radius: 10px;
        padding: 10px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 8px 40px rgba(0, 31, 14, 0.15);
        text-align: center;
        position: relative;
        z-index: 1;
        animation: scaleIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
      }

      .store-banner {
        width: 100%;
        border-radius: 6px;
        background: linear-gradient(135deg, #1f9821 0%, #145f15 100%);
        height: 320px;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .logo-image img {
        width: 100%;
      }

      .logo-image {
        padding: 30px;
        background: #fffffffa;
        border-radius: 20px;
        max-width: 394px;
      }

      /* shimmer sweep */
      .store-banner::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        background-size: 400px 100%;
        animation: shimmer 2.4s linear infinite;
      }

      .store-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #131d29;
        margin: 12px 0 8px;
      }

      /* ── Content area ── */
      .content {
        width: 100%;
        max-width: 500px;
        padding: 0 16px;
        margin-top: -44px;
        position: relative;
        z-index: 10;
        padding-top: 100px;
      }

      /* ── Section title ── */
      .section-title {
        font-size: 2.1rem;
        font-weight: 600;
        color: #131d29;
        margin: 24px 0 10px;
        animation: fadeUp 0.6s ease 0.4s both;
        text-align: center;
        padding-bottom: 40px;
      }
      /* ── Social links ── */
      .social-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .social-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: #fff;
        border-radius: 8px;
        text-decoration: none;
        box-shadow: 1px 6px 30px rgba(0, 31, 14, 0.05);
        position: relative;
        overflow: hidden;
        /* staggered entrance */
        opacity: 0;
        transform: translateY(20px);
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          opacity 0.22s ease;
      }

      /* ripple overlay */
      .social-link .ripple-el {
        position: absolute;
        border-radius: 50%;
        background: rgba(31, 152, 33, 0.18);
        width: 10px;
        height: 10px;
        pointer-events: none;
        animation: ripple 0.6s linear forwards;
      }

      .social-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 36px rgba(0, 31, 14, 0.12);
      }

      .social-link-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .social-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
        transition: transform 0.25s ease;
      }

      .social-link:hover .social-icon {
        transform: scale(1.12) rotate(-4deg);
      }

      .icon-whatsapp {
        background: #25d366;
      }
      .icon-facebook {
        background: #1877f2;
      }
      .icon-instagram {
        background: linear-gradient(
          135deg,
          #f09433,
          #e6683c,
          #dc2743,
          #cc2366,
          #bc1888
        );
      }

      .social-name {
        font-size: 1rem;
        font-weight: 600;
        color: #131d29;
      }

      .chevron {
        color: #767c83;
        font-size: 20px;
        transition: transform 0.2s ease;
      }
      .social-link:hover .chevron {
        transform: translateX(4px);
      }

      /* ── Contact card ── */
      .contact-card {
        background: #fff;
        border-radius: 8px;
        padding: 16px 14px;
        box-shadow: 1px 6px 30px rgba(0, 31, 14, 0.05);
        margin-bottom: 36px;
        opacity: 0;
        transform: translateY(24px);
        transition: box-shadow 0.3s ease;
      }

      .contact-card:hover {
        box-shadow: 0 12px 40px rgba(0, 31, 14, 0.1);
      }

      .contact-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }

      .contact-icon-box {
        width: 44px;
        height: 44px;
        background: #f9f9f9;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .contact-icon-box img {
        width: 26px;
      }
      .contact-label {
        font-size: 1rem;
        font-weight: 600;
        color: #131d29;
      }

      .divider {
        height: 1px;
        background: #f2f2f2;
        border-radius: 99px;
        margin: 12px 0;
      }

      .contact-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 6px 0;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        border-radius: 6px;
        transition:
          background 0.18s ease,
          transform 0.18s ease;
      }

      .contact-row:hover {
        background: #f7fdf7;
        transform: translateX(4px);
      }

      .contact-row-icon {
        width: 40px;
        height: 40px;
        background: #f9f9f9;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        transition:
          background 0.18s ease,
          transform 0.2s ease;
      }

      .contact-row:hover .contact-row-icon {
        background: #e8f8e8;
        transform: scale(1.1);
      }

      .contact-row-text p:first-child {
        font-size: 11px;
        color: #767c83;
      }
      .contact-row-text p:last-child {
        font-size: 0.9rem;
        font-weight: 600;
        color: #131d29;
      }
      .footer {
        padding: 27px 20px;
        background: #1f9821;
        color: white;
        font-size: 14px;
        font-weight: 500;
        width: 100%;
        text-align: center;
        margin-top: 20px;
      }

      /* ── Visible state (JS toggled) ── */
      .visible {
        opacity: 1 !important;
        transform: none !important;
      }

      /* Screen sizes below 769px */
      @media (max-width: 768px) {
        .content {
          padding-top: 70px;
        }
      }

      /* Screen sizes below 500px */
      @media (max-width: 499px) {
        .logo-image {
          max-width: 300px;
        }

        .store-card {
          margin-bottom: 40px;
        }
      }

      /* Screen sizes below 400px */
      @media (max-width: 399px) {
        .store-banner {
          height: 260px;
        }
      }

      @media (max-width: 480px) {
        .hero {
          padding-bottom: 110px;
        }
        .store-title {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>

    <script>
      // Staggered entrance for social links
      const links = document.querySelectorAll(".social-link");
      links.forEach((el, i) => {
        setTimeout(() => el.classList.add("visible"), 500 + i * 120);
      });

      // Contact card entrance
      const card = document.querySelector(".contact-card");
      setTimeout(() => card.classList.add("visible"), 900);

      // Ripple effect on social links
      links.forEach((link) => {
        link.addEventListener("click", function (e) {
          const r = document.createElement("span");
          r.className = "ripple-el";
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height) * 2;
          r.style.cssText = `
        width:${size}px; height:${size}px;
        left:${e.clientX - rect.left - size / 2}px;
        top:${e.clientY - rect.top - size / 2}px;
      `;
          this.appendChild(r);
          setTimeout(() => r.remove(), 650);
        });
      });
    </script>
